name: core
description: >-
  Pure-Dart domain layer for Agora: models (freezed) and abstract repository
  interfaces. Depends on nothing app-specific; every other package depends on
  this one.
publish_to: none
version: 0.1.0

resolution: workspace

environment:
  sdk: ^3.8.0

dependencies:
  freezed_annotation: ^3.0.0
  json_annotation: ^4.12.0

dev_dependencies:
  build_runner: ^2.4.0
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  test: ^1.25.0
  very_good_analysis: ^9.0.0
