name: Deploy to GitHub Pages

# Publica la PWA en GitHub Pages en cada cambio en main.
# `workflow_dispatch` permite lanzarlo también a mano desde la pestaña Actions
# (útil para el primer despliegue, tras activar Pages en Settings).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos mínimos que necesita el despliegue a Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un despliegue a la vez; no cancelar uno en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
